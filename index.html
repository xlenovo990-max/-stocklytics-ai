<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 庫存利潤智慧管家 v3.5 PRO</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin-top: 30px;
            margin-bottom: 50px;
        }
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 30px;
            background: #fff;
        }
        .form-label {
            font-weight: 500;
            color: #495057;
            margin-top: 15px;
        }
        .form-control, .form-select {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #ced4da;
            background-color: #f8f9fa;
        }
        .form-control:focus, .form-select:focus {
            background-color: #fff;
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13,110,253,.15);
        }
        .btn-primary {
            border-radius: 10px;
            padding: 14px;
            font-weight: 600;
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            border: none;
            margin-top: 25px;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13,110,253,0.3);
        }
        .api-box {
            background-color: #fff8ee;
            border: 1px dashed #ffc107;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
        }
        #resultBox {
            display: none;
            margin-top: 25px;
            border-left: 5px solid #0d6efd;
            border-radius: 4px 12px 12px 4px;
            background-color: #f0f7ff;
            padding: 20px;
        }
        .lang-switch {
            text-align: right;
            margin-bottom: 15px;
        }
        .lang-btn {
            background: #e9ecef;
            border: none;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #495057;
            cursor: pointer;
        }
        .lang-btn:hover {
            background: #dee2e6;
        }
        .report-text {
            white-space: pre-wrap;
            line-height: 1.8;
        }
        .report-text h1, .report-text h2, .report-text h3 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0a58ca;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .report-text strong {
            color: #111;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <!-- 頂部版本與語言切換 -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="text-muted small fw-bold" id="versionText">v3.5 PRO</span>
            <button class="lang-btn" id="langBtn" onclick="toggleLanguage()">English</button>
        </div>

        <!-- API 金鑰輸入框（無痕無記憶體、全英文高安全感提示字） -->
        <div class="api-box">
            <label class="form-label mt-0 fw-bold" id="apiKeyLabel">🔑 OpenRouter API Key <span class="text-muted small fw-normal">(基於隱私安全，關閉網頁即自動銷毀，不留痕跡)</span></label>
            <input type="password" id="apiKey" class="form-control" placeholder="Please paste your OpenRouter API Key here (Will NOT be saved on any server)">
        </div>

        <h2 class="text-center mb-4 fw-bold" id="mainTitle">📊 AI 庫存利潤智慧管家</h2>

        <!-- 表單資料 -->
        <label class="form-label" id="labelProdName">商品名稱</label>
        <input type="text" id="prodName" class="form-control" placeholder="例如：手作水晶手鍊">

        <label class="form-label" id="labelCurrency">使用的貨幣單位</label>
        <select id="currency" class="form-select">
            <option value="HKD">HKD ($)</option>
            <option value="USD">USD ($)</option>
            <option value="EUR">EUR (€)</option>
            <option value="TWD">TWD ($)</option>
            <option value="JPY">JPY (¥)</option>
        </select>

        <label class="form-label" id="labelStock">目前庫存量</label>
        <input type="number" id="stock" class="form-control" value="0">

        <label class="form-label" id="labelAlert">警戒值（低於此數提醒）</label>
        <input type="number" id="alertThreshold" class="form-control" value="5">

        <label class="form-label" id="labelCost">單件商品成本</label>
        <input type="number" id="cost" class="form-control" value="0">

        <label class="form-label" id="labelPrice">單件預計售價</label>
        <input type="number" id="price" class="form-control" value="0">

        <!-- 觸發按鈕 -->
        <button class="btn btn-primary w-100" id="submitBtn" onclick="runAnalysis()">開始 AI 營運與利潤精算</button>

        <!-- 結果顯示區域 -->
        <div id="resultBox">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h5 class="fw-bold text-primary m-0" id="reportTitle">📋 AI CFO 營運報告</h5>
                <button class="btn btn-sm btn-outline-secondary" id="copyBtn" onclick="copyReport()">📋 Copy Report</button>
            </div>
            <div id="reportContent" class="report-text"></div>
        </div>
    </div>
</div>

<!-- JavaScript 邏輯 -->
<script>
    let currentLang = 'zh';

    const i18n = {
        zh: {
            langBtn: "English",
            apiKeyLabel: "🔑 OpenRouter API Key <span class='text-muted small fw-normal'>(基於隱私安全，關閉網頁即自動銷毀，不留痕跡)</span>",
            mainTitle: "📊 AI 庫存利潤智慧管家",
            labelProdName: "商品名稱",
            placeholderProdName: "例如：手作水晶手鍊",
            labelCurrency: "使用的貨幣單位",
            labelStock: "目前庫存量",
            labelAlert: "警戒值（低於此數提醒）",
            labelCost: "單件商品成本",
            labelPrice: "單件預計售價",
            submitBtn: "開始 AI 營運與利潤精算",
            loadingText: "🔄 AI 財務專家正在計算中，請稍候...",
            reportTitle: "📋 AI CFO 營運報告",
            copyBtn: "📋 複製報告",
            alertNoKey: "請先輸入您的 OpenRouter API Key！",
            alertNoName: "請輸入商品名稱！",
            promptSystem: "你是一位精通跨境電商、零售與供應鏈管理的資深 AI 財務長（CFO）。請針對使用者輸入的商品數據，進行精準的庫存水位評估、補貨成本計算、潛在利潤分析，並給出2條具體的店鋪營運與行銷優化策略。請務必使用『繁體中文』回答。格式請多利用條列式與粗體字，讓排版清晰易讀。"
        },
        en: {
            langBtn: "繁體中文",
            apiKeyLabel: "🔑 OpenRouter API Key <span class='text-muted small fw-normal'>(Privacy Safe: Destroyed upon closing browser)</span>",
            mainTitle: "📊 AI Stock & Profit Manager",
            labelProdName: "Product Name",
            placeholderProdName: "e.g., Handmade Crystal Bracelet",
            labelCurrency: "Currency Unit",
            labelStock: "Current Stock",
            labelAlert: "Alert Threshold (Restock Warning)",
            labelCost: "Cost per Unit",
            labelPrice: "Expected Retail Price",
            submitBtn: "Run AI Financial Analysis",
            loadingText: "🔄 AI Financial Expert is calculating, please wait...",
            reportTitle: "📋 AI CFO Operations Report",
            copyBtn: "📋 Copy Report",
            alertNoKey: "Please enter your OpenRouter API Key first!",
            alertNoName: "Please enter the product name!",
            promptSystem: "You are an expert AI Chief Financial Officer (CFO) specializing in cross-border e-commerce and retail supply chain management. Analyze the product data provided and output a comprehensive financial report detailing: 1. Stock level evaluation, 2. Restock cost calculation, 3. Profit margin analysis, and 4. Two actionable store operations/marketing optimization strategies. You MUST reply in English. Use clean bullet points and bold text for layout."
        }
    };

    function toggleLanguage() {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        const t = i18n[currentLang];
        
        document.getElementById('langBtn').innerText = t.langBtn;
        document.getElementById('apiKeyLabel').innerHTML = t.apiKeyLabel;
        document.getElementById('mainTitle').innerText = t.mainTitle;
        document.getElementById('labelProdName').innerText = t.labelProdName;
        document.getElementById('prodName').placeholder = t.placeholderProdName;
        document.getElementById('labelCurrency').innerText = t.labelCurrency;
        document.getElementById('labelStock').innerText = t.labelStock;
        document.getElementById('labelAlert').innerText = t.labelAlert;
        document.getElementById('labelCost').innerText = t.labelCost;
        document.getElementById('labelPrice').innerText = t.labelPrice;
        document.getElementById('submitBtn').innerText = t.submitBtn;
        document.getElementById('reportTitle').innerText = t.reportTitle;
        document.getElementById('copyBtn').innerText = t.copyBtn;
    }

    // 將 Markdown 的標題和粗體轉換成精美網頁 HTML 的簡單過濾器
    function formatMarkdown(text) {
        let html = text;
        // 替換 ### 標題、## 標題、# 標題
        html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
        html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
        html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
        // 替換粗體 **text**
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        return html;
    }

    async function runAnalysis() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const prodName = document.getElementById('prodName').value.trim();
        const currency = document.getElementById('currency').value;
        const stock = parseInt(document.getElementById('stock').value) || 0;
        const alertThreshold = parseInt(document.getElementById('alertThreshold').value) || 0;
        const cost = parseFloat(document.getElementById('cost').value) || 0;
        const price = parseFloat(document.getElementById('price').value) || 0;

        const t = i18n[currentLang];

        if (!apiKey) {
            alert(t.alertNoKey);
            return;
        }
        if (!prodName) {
            alert(t.alertNoName);
            return;
        }

        const submitBtn = document.getElementById('submitBtn');
        const resultBox = document.getElementById('resultBox');
        const reportContent = document.getElementById('reportContent');

        submitBtn.disabled = true;
        submitBtn.innerText = t.loadingText;
        resultBox.style.display = "block";
        reportContent.innerText = t.loadingText;

        // 構造發送給 DeepSeek 的數據 Prompt
        const userPrompt = `
以下是商品的當前數據，請為我生成財務分析報告：
- 商品名稱：${prodName}
- 貨幣單位：${currency}
- 目前庫存量：${stock} 件
- 庫存警戒值：${alertThreshold} 件
- 單件商品成本：${cost} ${currency}
- 單件預計售價：${price} ${currency}
        `;

        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${apiKey}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "model": "deepseek/deepseek-chat", 
                    "messages": [
                        {"role": "system", "content": t.promptSystem},
                        {"role": "user", "content": userPrompt}
                    ]
                })
            });

            const data = await response.json();
            
            if (data.choices && data.choices[0]) {
                const rawReport = data.choices[0].message.content;
                // 經過 formatMarkdown 過濾器美化後再渲染
                reportContent.innerHTML = formatMarkdown(rawReport);
            } else {
                reportContent.innerText = "Error: 無法取得 AI 回應，請檢查 API Key 是否正確或額度是否充足。";
            }

        } catch (error) {
            reportContent.innerText = "連線失敗: " + error.message;
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = t.submitBtn;
        }
    }

    function copyReport() {
        const reportContent = document.getElementById('reportContent');
        navigator.clipboard.writeText(reportContent.innerText);
        alert(currentLang === 'zh' ? "報告已成功複製到剪貼簿！" : "Report copied to clipboard!");
    }
</script>

</body>
    </html>
