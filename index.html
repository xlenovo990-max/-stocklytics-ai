<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 庫存與利潤預警小助手</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 30px 20px; 
            max-width: 440px; 
            margin: auto; 
            background-color: #f4f7f6; 
            color: #2c3e50; 
        }

        .container {
            background-color: #ffffff;
            padding: 28px 24px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        /* 🌐 頂部控制列 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .lang-btn {
            background: #e2e8f0;
            color: #4a5568;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lang-btn:hover { background: #cbd5e1; }

        /* 🔒 API Key 安全輸入區 (無痕防毒版) */
        .api-box {
            background-color: #f8fafc;
            border: 1px dashed #cbd5e1;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .api-box label { display: block; font-size: 11px; color: #64748b; margin-bottom: 4px; font-weight: 600; }
        .api-box input { padding: 6px 10px; font-size: 12px; background-color: #ffffff; width: 100%; box-sizing: border-box; border: 1px solid #e2e8f0; border-radius: 6px; }

        h2 { 
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 21px;
            color: #1a2a3a;
            text-align: center;
            font-weight: 700;
        }
        
        .form-group { margin-bottom: 18px; }
        
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            font-size: 14px;
            color: #4a5568;
        }
        
        input, select { 
            width: 100%; 
            padding: 12px 14px; 
            box-sizing: border-box; 
            border: 1px solid #e2e8f0; 
            border-radius: 8px; 
            font-size: 15px;
            background-color: #f8fafc;
            transition: all 0.2s ease;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        
        button.submit-btn { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 600;
            margin-top: 12px; 
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            transition: all 0.2s ease;
        }
        button.submit-btn:active { transform: scale(0.98); }
        
        /* 📈 結果儀表板與複製按鈕 */
        .result-container {
            position: relative;
            margin-top: 24px;
            display: none;
        }
        #result { 
            padding: 18px; 
            border-radius: 10px; 
            background-color: #f0f7ff; 
            border-left: 5px solid #3b82f6;
            line-height: 1.7; 
            white-space: pre-wrap; 
            font-size: 15px;
            color: #1e293b;
        }
        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #ffffff;
            color: #3b82f6;
            border: 1px solid #bfdbfe;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .copy-btn:hover { background-color: #eff6ff; }

        code {
            background-color: #e2e8f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            color: #0f172a;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-bar">
            <span style="font-size: 12px; color: #94a3b8; font-weight: 600;">v3.5 PRO</span>
            <button class="lang-btn" onclick="toggleLanguage()" id="langBtn">English</button>
        </div>

        <div class="api-box">
            <label id="lblApiKey">🔑 OpenRouter API Key (基於隱私安全，關閉網頁即自動銷毀，不留痕跡)</label>
            <input type="password" id="apiKeyField" placeholder="sk-or-v1-......">
        </div>

        <h2 id="uiTitle">📊 AI 庫存利潤智慧管家</h2>

        <div class="form-group">
            <label id="lblProdName">商品名稱</label>
            <input type="text" id="productName" placeholder="例如：手作水晶手鍊">
        </div>

        <div class="form-group">
            <label id="lblCurrency">使用的貨幣單位</label>
            <select id="currencySelect">
                <option value="HKD">HKD ($)</option>
                <option value="USD">USD ($)</option>
                <option value="TWD">TWD (NT$)</option>
                <option value="EUR">EUR (€)</option>
                <option value="RMB">RMB (¥)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label id="lblStock">目前庫存量</label>
            <input type="text" inputmode="numeric" pattern="[0-9]*" id="currentStock" placeholder="0">
        </div>
        
        <div class="form-group">
            <label id="lblThreshold">警戒值（低於此數提醒）</label>
            <input type="text" inputmode="numeric" pattern="[0-9]*" id="threshold" placeholder="5">
        </div>

        <div class="form-group">
            <label id="lblCost">單件商品成本</label>
            <input type="text" inputmode="numeric" pattern="[0-9]*" id="productCost" placeholder="0">
        </div>

        <div class="form-group">
            <label id="lblPrice">單件預計售價</label>
            <input type="text" inputmode="numeric" pattern="[0-9]*" id="productPrice" placeholder="0">
        </div>
        
        <button class="submit-btn" onclick="analyzeStock()" id="btnSubmit">開始 AI 營運與利潤精算</button>

        <div class="result-container" id="resultContainer">
            <button class="copy-btn" onclick="copyReport()" id="btnCopy">📋 複製報告</button>
            <div id="result"></div>
        </div>
    </div>

    <script>
        let currentLang = 'zh'; 
        let rawAiText = ""; // 用於儲存未過濾的純文字方便用戶複製

        const i18n = {
            zh: {
                title: "📊 AI 庫存利潤智慧管家",
                apiKey: "🔑 OpenRouter API Key (基於隱私安全，關閉網頁即自動銷毀，不留痕跡)",
                prodName: "商品名稱",
                prodPlaceholder: "例如：手作水晶手鍊",
                currency: "使用的貨幣單位",
                stock: "目前庫存量",
                threshold: "警戒值（低於此數提醒）",
                cost: "單件商品成本",
                price: "單件預計售價",
                submit: "開始 AI 營運與利潤精算",
                loading: "🔄 AI 財務專家正在計算最佳資金產出率...",
                alert: "請完整輸入所有資料喔！",
                alertKey: "請先填入您的 OpenRouter API Key 喔！",
                btn: "English",
                copy: "📋 複製報告",
                copied: "✅ 已複製到剪貼簿！"
            },
            en: {
                title: "📊 AI Inventory & Profit Manager",
                apiKey: "🔑 OpenRouter API Key (Zero-trace local privacy. Auto-destroys on close)",
                prodName: "Product Name",
                prodPlaceholder: "e.g., Handmade Crystal Bracelet",
                currency: "Currency Unit",
                stock: "Current Stock Level",
                threshold: "Alert Threshold (Remind when below)",
                cost: "Cost per Unit",
                price: "Expected Retail Price",
                submit: "Run AI Financial Analysis",
                loading: "🔄 AI Financial Expert is calculating capital efficiency...",
                alert: "Please fill in all the fields!",
                alertKey: "Please enter your OpenRouter API Key first!",
                btn: "繁體中文",
                copy: "📋 Copy Report",
                copied: "✅ Copied to clipboard!"
            }
        };

        // 🔥 關鍵安全升級：徹底移除 localStorage 讀取，不留物理物理痕跡

        function toggleLanguage() {
            currentLang = (currentLang === 'zh') ? 'en' : 'zh';
            const langData = i18n[currentLang];
            
            document.getElementById('uiTitle').innerText = langData.title;
            document.getElementById('lblApiKey').innerText = langData.apiKey;
            document.getElementById('lblProdName').innerText = langData.prodName;
            document.getElementById('productName').placeholder = langData.prodPlaceholder;
            document.getElementById('lblCurrency').innerText = langData.currency;
            document.getElementById('lblStock').innerText = langData.stock;
            document.getElementById('lblThreshold').innerText = langData.threshold;
            document.getElementById('lblCost').innerText = langData.cost;
            document.getElementById('lblPrice').innerText = langData.price;
            document.getElementById('btnSubmit').innerText = langData.submit;
            document.getElementById('langBtn').innerText = langData.btn;
            document.getElementById('btnCopy').innerText = langData.copy;
            
            document.getElementById('resultContainer').style.display = 'none';
        }

        async function analyzeStock() {
            // 精準抓取你網頁中定義的各個欄位 ID
            const apiKey = document.getElementById('apiKeyField').value.trim();
            const name = document.getElementById('productName').value.trim();
            const currency = document.getElementById('currencySelect').value;
            const current = parseInt(document.getElementById('currentStock').value);
            const threshold = parseInt(document.getElementById('threshold').value);
            const cost = parseInt(document.getElementById('productCost').value);
            const price = parseInt(document.getElementById('productPrice').value);
            const container = document.getElementById('resultContainer');
            const resultDiv = document.getElementById('result');

            if (!apiKey) {
                alert(i18n[currentLang].alertKey);
                return;
            }

            // 🔥 關鍵安全升級：徹底移除了 localStorage.setItem。每次用完即走，安全拉滿！

            if (name === "" || isNaN(current) || isNaN(threshold) || isNaN(cost) || isNaN(price)) {
                alert(i18n[currentLang].alert);
                return;
            }

            container.style.display = 'block';
            resultDiv.innerHTML = `<span style='color: #64748b;'>${i18n[currentLang].loading}</span>`;

            let promptText = `You are a professional e-commerce financial management expert. 
Product: ${name}
Current Stock: ${current} units
Alert Threshold: ${threshold} units
Cost per Unit: ${cost} ${currency}
Selling Price per Unit: ${price} ${currency}
Currency to use in all calculations: ${currency}

Please evaluate stock level and calculate total restock cost, net profit, and profit margin if restocking is needed. 
Reply strictly in ${currentLang === 'zh' ? 'Traditional Chinese (Hong Kong)' : 'English'}. Keep the tone professional, business-focused, and highly actionable with clear bullet points.`;

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`, 
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": "deepseek/deepseek-chat", 
                        "messages": [{"role": "user", "content": promptText}]
                    })
                });

                const data = await response.json();
                
                if (!response.ok || data.error) {
                    const errorMsg = data.error?.message || "Authentication Failed or Rate Limited";
                    resultDiv.innerText = `Error: ${errorMsg}`;
                    return;
                }

                if (data.choices && data.choices[0]) {
                    rawAiText = data.choices[0].message.content;
                    let aiMessage = rawAiText;
                    
                    // 商品級美化解析過濾器
                    aiMessage = aiMessage.replace(/###\s*(.*?)(?=\n|$)/g, '<strong style="display:block; font-size:16px; color:#1a2a3a; margin-top:16px; margin-bottom:6px;">$1</strong>');
                    aiMessage = aiMessage.replace(/---/g, '<hr style="border:0; border-top:1px dashed #cbd5e1; margin:15px 0;">');
                    aiMessage = aiMessage.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    aiMessage = aiMessage.replace(/`(.*?)`/g, '<code>$1</code>');
                    
                    resultDiv.innerHTML = aiMessage;
                } else {
                    resultDiv.innerText = "Error decoding response.";
                }

            } catch (error) {
                resultDiv.innerText = `Network/System Error: ${error.message}`;
            }
        }

        // 📋 一鍵複製功能
        function copyReport() {
            if (!rawAiText) return;
            navigator.clipboard.writeText(rawAiText).then(() => {
                const copyBtn = document.getElementById('btnCopy');
                const originalText = copyBtn.innerText;
                copyBtn.innerText = i18n[currentLang].copied;
                setTimeout(() => { copyBtn.innerText = originalText; }, 2000);
            }).catch(err => {
                console.error("Clipboard blocked: ", err);
            });
        }
    </script>
</body>
    </html>
